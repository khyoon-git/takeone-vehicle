<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B1020">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-title" content="테이크원">
<title>테이크원 태권도</title>
<style>
:root{
  --bg:#F4F5F8; --ink:#111827; --muted:#6B7280; --line:#E5E7EB;
  --brand:#E11D2E; --brand-d:#B0121F; --navy:#0B1020; --navy2:#182038;
  --card:#FFFFFF; --gold:#F5C24B;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none;}

/* ── HERO ── */
.hero{
  position:relative; background:#fff; text-align:center;
  padding:44px 22px 38px; border-bottom:1px solid var(--line);
}
.hero::after{
  content:""; position:absolute; left:0; right:0; bottom:0; height:4px;
  background:linear-gradient(90deg, var(--brand) 0%, var(--brand) 60%, var(--gold) 60%, var(--gold) 100%);
}
.hero-in{max-width:1000px; margin:0 auto;}
.hero .logo{height:240px; width:auto; max-width:86%; display:block; margin:0 auto;}
.hero .tagline{margin:22px 0 0; font-size:16px; color:var(--muted); font-weight:600;}

/* ── MENU ── */
.wrap{max-width:1000px; margin:0 auto; padding:28px 22px 60px;}
.sec-h{display:flex; align-items:baseline; gap:10px; margin:4px 2px 16px;}
.sec-h h2{margin:0; font-size:18px; font-weight:800;}
.sec-h span{font-size:13px; color:var(--muted);}
.grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:14px;}
.card{
  position:relative; display:block; background:var(--card); border:1px solid var(--line);
  border-radius:16px; padding:20px 18px; transition:transform .15s, box-shadow .15s, border-color .15s;
}
a.card:hover{transform:translateY(-3px); box-shadow:0 10px 26px rgba(17,24,39,.10); border-color:#D6DAE2;}
.card .ic{
  width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:24px; background:#FDECEE; margin-bottom:14px;
}
.card h3{margin:0 0 4px; font-size:17px; font-weight:800;}
.card p{margin:0; font-size:13.5px; color:var(--muted); line-height:1.5;}
.card .go{margin-top:14px; font-size:13px; font-weight:800; color:var(--brand); display:flex; align-items:center; gap:4px;}
.card.soon{background:#FAFBFC;}
.card.soon .ic{background:#EEF0F4;}
.card.soon h3{color:#9AA1AE;}
.badge-soon{
  position:absolute; top:14px; right:14px; font-size:11px; font-weight:800; color:#8A93A3;
  background:#EEF0F4; padding:3px 9px; border-radius:999px;
}

/* ── FOOTER ── */
.foot{max-width:1000px;margin:0 auto;padding:22px; color:#9AA1AE; font-size:12.5px; text-align:center; border-top:1px solid var(--line);}
.foot a.admin{color:#C2C7D0;}

@media(max-width:560px){
  .hero{padding:44px 18px 40px;}
  .hero .logo{height:168px;}
  .wrap{padding:24px 16px 48px;}
  .grid{grid-template-columns:1fr 1fr; gap:12px;}
  .card{padding:16px 14px;}
  .card .ic{width:44px;height:44px;font-size:22px;}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-in">
    <img class="logo" src="/logo.svg" alt="테이크원 태권도">
    <p class="tagline">아이들의 건강한 성장을 응원합니다</p>
  </div>
</div>

<div class="wrap">
  <div class="sec-h">
    <h2>메뉴</h2>
    <span>이용하실 항목을 눌러주세요</span>
  </div>
  <div class="grid" id="menuGrid"></div>
</div>

<div class="foot">
  © <span id="yr"></span> 테이크원 태권도 &nbsp;·&nbsp; <a class="admin" href="/admin">관리자</a>
</div>

<script>
// 앞으로 메뉴는 이 배열에 항목만 추가하면 됩니다.
// ready:true 면 클릭 가능(href로 이동), false 면 '준비중'으로 표시됩니다.
const MENU=[
  {icon:'🚌', title:'차량 신청', desc:'등·하원 차량 신청 및 조회·수정', href:'/vehicle', ready:true},
  {icon:'📢', title:'공지사항', desc:'도장 소식과 공지를 확인하세요', href:'#', ready:false},
  {icon:'📄', title:'안내문', desc:'각종 안내 및 서식 다운로드', href:'#', ready:false},
  {icon:'🗓️', title:'시간표', desc:'수업 시간 안내', href:'#', ready:false},
  {icon:'🥋', title:'도장 소개', desc:'테이크원 태권도를 소개합니다', href:'#', ready:false},
  {icon:'📍', title:'오시는 길', desc:'위치 및 문의 안내', href:'#', ready:false},
];

document.getElementById('menuGrid').innerHTML = MENU.map(m=>{
  if(m.ready){
    return `<a class="card" href="${m.href}">
      <div class="ic">${m.icon}</div>
      <h3>${m.title}</h3>
      <p>${m.desc}</p>
      <div class="go">바로가기 →</div>
    </a>`;
  }
  return `<div class="card soon">
    <span class="badge-soon">준비중</span>
    <div class="ic">${m.icon}</div>
    <h3>${m.title}</h3>
    <p>${m.desc}</p>
  </div>`;
}).join('');

document.getElementById('yr').textContent=new Date().getFullYear();

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}
</script>
</body>
</html>
