<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>테이크원 · 관리자</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --purple:#7C3AED;--blue:#2563EB;--bg:#F1F5F9;--line:#E2E8F0;
  --ink:#0F172A;--muted:#64748B;--red:#EF4444;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;
}
.page{display:none;}
.page.active{display:block;}

/* ── LOGIN ── */
.login-page.active{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px;}
.login-card{background:#fff;width:100%;max-width:400px;border-radius:16px;box-shadow:0 10px 40px rgba(15,23,42,.12);padding:36px 32px;}
.login-icon{font-size:44px;text-align:center;line-height:1;}
.login-title{font-size:22px;font-weight:800;text-align:center;margin:12px 0 4px;}
.login-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:24px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.field .row{display:flex;gap:8px;}
.input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;color:var(--ink);background:#fff;}
.input:focus{border-color:var(--purple);}
.emsg{color:var(--red);font-size:13px;display:none;margin:2px 0 12px;}
.emsg.show{display:block;}
.eye-btn{border:1.5px solid var(--line);border-radius:10px;background:#fff;padding:0 12px;cursor:pointer;font-size:16px;flex-shrink:0;}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 15px;font-size:14px;transition:filter .15s;white-space:nowrap;}
.btn:hover{filter:brightness(.96);}
.btn:active{filter:brightness(.9);}
.btn-full{width:100%;padding:13px;font-size:15px;}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:8px;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-gray{background:#E2E8F0;color:#0F172A;}
.btn-excel{background:#15803D;color:#fff;}
.btn-ghost{background:#fff;color:#334155;border:1.5px solid var(--line);}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);}
.topbar-in{max-width:1400px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.brand{font-size:17px;font-weight:800;display:flex;align-items:center;gap:10px;margin-right:6px;}
.brand .pill{background:var(--purple);color:#fff;font-size:12px;font-weight:800;padding:4px 11px;border-radius:999px;}
.spacer{flex:1;}
.count-lbl{color:var(--muted);font-size:13px;margin-right:4px;}

/* ── CONTAINER ── */
.container{max-width:1400px;margin:0 auto;padding:20px 24px 60px;}

/* ── SUMMARY ── */
.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 18px;min-width:92px;}
.stat .k{font-size:12px;color:var(--muted);font-weight:700;}
.stat .v{font-size:24px;font-weight:800;margin-top:2px;line-height:1.1;}
.stat.accent{background:var(--purple);border-color:var(--purple);color:#fff;}
.stat.accent .k{color:rgba(255,255,255,.85);}
.stat.day .k{color:#4338CA;}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.search{flex:1;min-width:220px;max-width:360px;}
.select{border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px;font-family:inherit;background:#fff;outline:none;color:var(--ink);cursor:pointer;}
.select:focus{border-color:var(--purple);}
.shown{color:var(--muted);font-size:13px;}

/* ── TABLE ── */
.tablewrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:auto;max-height:calc(100vh - 268px);}
table{width:100%;border-collapse:separate;border-spacing:0;min-width:1080px;font-size:13.5px;}
thead th{position:sticky;top:0;background:#F8FAFC;z-index:5;text-align:left;font-size:12px;font-weight:800;color:var(--muted);padding:12px 14px;border-bottom:1px solid var(--line);white-space:nowrap;}
tbody td{padding:11px 14px;border-bottom:1px solid #F1F5F9;vertical-align:top;color:var(--ink);}
tbody tr:hover td{background:#FAFAFF;}
tbody tr.grp td{border-top:2px solid #E2E8F0;}
td.num{color:var(--muted);white-space:nowrap;}
td.nm{font-weight:800;white-space:nowrap;}
td.memo{max-width:280px;white-space:pre-wrap;color:#334155;}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap;}
.badge-day{background:#EEF2FF;color:#4338CA;}
.badge-time{background:#ECFEFF;color:#0E7490;}
.badge-m{background:#F1F5F9;color:#334155;font-weight:700;}
td.days{white-space:normal;line-height:2;}
td.days .badge{margin:2px 4px 2px 0;}
.pdv{display:inline-block;margin-right:10px;white-space:nowrap;}
.pdv b{color:#4338CA;font-weight:800;margin-right:3px;}
tbody tr.grp-start td{border-top:2px solid #E2E8F0;}
td.nm,td.num{vertical-align:top;}
td.nm{background:#FCFCFF;}
.empty{text-align:center;padding:64px 20px;color:var(--muted);}
.empty-ico{font-size:44px;margin-bottom:10px;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:26px 24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal h3{margin:0 0 8px;font-size:18px;text-align:center;font-weight:800;}
.modal p{margin:0 0 20px;color:var(--muted);text-align:center;line-height:1.6;font-size:15px;}
.modal-acts{display:grid;gap:8px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(120px);background:rgba(15,23,42,.92);color:#fff;padding:12px 22px;border-radius:24px;font-size:14px;font-weight:600;transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:200;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:rgba(22,163,74,.95);}
.toast.warn{background:rgba(234,88,12,.95);}

@media(max-width:640px){
  .topbar-in,.container{padding-left:14px;padding-right:14px;}
  .brand{font-size:15px;}
}
</style>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div class="page login-page active" id="page-admin-login">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">차량 신청 현황 관리</div>
    <div class="field">
      <label>비밀번호</label>
      <div class="row">
        <input class="input" type="password" id="adminPw" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()">
        <button class="eye-btn" type="button" onclick="toggleEye('adminPw')">👁</button>
      </div>
    </div>
    <div class="emsg" id="err-admin-login"></div>
    <button class="btn btn-purple btn-full" id="loginBtn" onclick="adminLogin()">로그인</button>
    <div style="text-align:center;margin-top:14px;"><a href="/" style="color:var(--muted);font-size:13px;text-decoration:none;">← 신청 페이지로</a></div>
  </div>
</div>

<!-- ════════ DASHBOARD ════════ -->
<div class="page" id="page-admin">
  <div class="topbar">
    <div class="topbar-in">
      <div class="brand"><span class="pill">🚌 테이크원</span> 차량 신청 관리</div>
      <span class="spacer"></span>
      <span class="count-lbl" id="admin-count-lbl">—</span>
      <button class="btn btn-ghost" onclick="loadRecords()">🔄 새로고침</button>
      <button class="btn btn-excel" onclick="exportExcel()">📊 엑셀 다운로드</button>
      <button class="btn btn-red" onclick="openDelModal()">🗑 전체삭제</button>
      <button class="btn btn-ghost" onclick="adminLogout()">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <div class="summary">
      <div class="stat accent"><div class="k">전체 신청</div><div class="v" id="sum-total">0</div></div>
      <div class="stat"><div class="k">학생 수</div><div class="v" id="sum-students">0</div></div>
      <div class="stat day"><div class="k">월</div><div class="v" id="sum-0">0</div></div>
      <div class="stat day"><div class="k">화</div><div class="v" id="sum-1">0</div></div>
      <div class="stat day"><div class="k">수</div><div class="v" id="sum-2">0</div></div>
      <div class="stat day"><div class="k">목</div><div class="v" id="sum-3">0</div></div>
      <div class="stat day"><div class="k">금</div><div class="v" id="sum-4">0</div></div>
    </div>

    <div class="toolbar">
      <input class="input search" type="text" id="filterName" placeholder="🔍 이름 검색" oninput="renderAdminTable()">
      <select class="select" id="filterDay" onchange="renderAdminTable()">
        <option value="">전체 요일</option>
        <option>월요일</option><option>화요일</option><option>수요일</option><option>목요일</option><option>금요일</option>
      </select>
      <span class="shown">표시 <strong id="shown-count">0</strong>명</span>
    </div>

    <div class="tablewrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>이름</th><th>요일</th><th>수업</th><th>등원장소</th>
            <th>하교시간</th><th>등원방법</th><th>하원장소</th><th>하원방법</th><th>메모</th><th></th>
          </tr>
        </thead>
        <tbody id="adminTbody"></tbody>
      </table>
      <div class="empty" id="adminEmpty" style="display:none;"><div class="empty-ico">📋</div>신청 내역이 없습니다</div>
    </div>
  </div>
</div>

<!-- 전체 삭제 모달 -->
<div class="modal-bg" id="modal-del">
  <div class="modal">
    <h3>⚠️ 전체 삭제</h3>
    <p>모든 신청 내역을 삭제합니다.<br>이 작업은 되돌릴 수 없습니다.</p>
    <div class="modal-acts">
      <button class="btn btn-red btn-full" onclick="clearAll()">삭제하기</button>
      <button class="btn btn-gray btn-full" onclick="closeDelModal()">취소</button>
    </div>
  </div>
</div>

<!-- 범용 확인 모달 -->
<div class="modal-bg" id="modal-confirm">
  <div class="modal">
    <h3 id="confirm-title">확인</h3>
    <p id="confirm-msg">진행할까요?</p>
    <div class="modal-acts">
      <button class="btn btn-red btn-full" id="confirm-ok">확인</button>
      <button class="btn btn-gray btn-full" id="confirm-cancel">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS=['월요일','화요일','수요일','목요일','금요일'];
let adminKey=sessionStorage.getItem('to_admin_key')||'';
let records=[];

/* ── API helper (관리자 키 헤더 포함) ── */
async function api(path,{method='GET',body,auth=false}={}){
  const headers={};
  if(body)headers['Content-Type']='application/json';
  if(auth&&adminKey)headers['x-admin-key']=adminKey;
  const res=await fetch(path,{method,headers,body:body?JSON.stringify(body):undefined});
  let data={};try{data=await res.json();}catch{}
  if(!res.ok){const err=new Error(data.error||('요청 실패 ('+res.status+')'));err.status=res.status;throw err;}
  return data;
}

/* ── PAGE ── */
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');}
function toggleEye(id){const el=document.getElementById(id);if(el)el.type=el.type==='password'?'text':'password';}

/* ── LOGIN ── */
async function adminLogin(){
  const pw=document.getElementById('adminPw').value;
  const err=document.getElementById('err-admin-login');
  if(!pw){showE(err,'비밀번호를 입력해 주세요');return;}
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='확인 중…';
  try{
    await api('/api/login',{method:'POST',body:{password:pw}});
    adminKey=pw;sessionStorage.setItem('to_admin_key',pw);
    err.classList.remove('show');document.getElementById('adminPw').value='';
    showPage('admin');await loadRecords();
  }catch(e){showE(err,'비밀번호가 올바르지 않습니다');}
  finally{btn.disabled=false;btn.textContent='로그인';}
}
function adminLogout(){adminKey='';sessionStorage.removeItem('to_admin_key');showPage('admin-login');}

/* ── LOAD / RENDER ── */
async function loadRecords(){
  try{
    const r=await api('/api/records',{auth:true});
    records=r.records||[];
    updateLbl();renderSummary();renderAdminTable();
  }catch(e){
    if(e.status===401){adminLogout();showE(document.getElementById('err-admin-login'),'다시 로그인해 주세요');}
    else toast('⚠️ '+e.message);
  }
}
function updateLbl(){document.getElementById('admin-count-lbl').textContent=`전체 ${records.length}건`;}
function renderSummary(){
  document.getElementById('sum-total').textContent=records.length;
  document.getElementById('sum-students').textContent=new Set(records.map(r=>r.이름)).size;
  DAYS.forEach((d,idx)=>{const el=document.getElementById('sum-'+idx);if(el)el.textContent=records.filter(r=>r.요일===d).length;});
}
function renderAdminTable(){
  const name=document.getElementById('filterName').value.trim().toLowerCase();
  const day=document.getElementById('filterDay').value;
  // 학생(이름+PIN)별로 묶기
  const map=new Map();
  records.forEach(r=>{const key=r.이름+'\u0000'+r.pin;if(!map.has(key))map.set(key,{이름:r.이름,pin:r.pin,recs:[]});map.get(key).recs.push(r);});
  let groups=[...map.values()];
  groups.forEach(g=>g.recs.sort((a,b)=>DAYS.indexOf(a.요일)-DAYS.indexOf(b.요일)));
  groups=groups.filter(g=>(!name||g.이름.toLowerCase().includes(name)));
  if(day){groups=groups.map(g=>({이름:g.이름,pin:g.pin,recs:g.recs.filter(r=>r.요일===day)})).filter(g=>g.recs.length);}
  groups.sort((a,b)=>a.이름.localeCompare(b.이름,'ko'));
  const tb=document.getElementById('adminTbody'),em=document.getElementById('adminEmpty');
  document.getElementById('shown-count').textContent=groups.length;
  if(!groups.length){tb.innerHTML='';em.style.display='';return;}
  em.style.display='none';
  let html='';
  groups.forEach((g,i)=>{
    const n=g.recs.length;
    g.recs.forEach((r,j)=>{
      const school=r.학교하교시간?r.학교하교시간.replace(':','  '):'-';
      const rest=`<td><span class="badge badge-day">${(r.요일||'').replace('요일','')}</span></td>`
        +`<td><span class="badge badge-time">${escapeHtml(r.희망수업시간)||'-'}</span></td>`
        +`<td>${escapeHtml(r.등원장소)||'-'}</td>`
        +`<td>${school}</td>`
        +`<td>${r.등원방법?`<span class="badge badge-m">${escapeHtml(r.등원방법)}</span>`:'-'}</td>`
        +`<td>${escapeHtml(r.하원장소)||'-'}</td>`
        +`<td>${r.하원방법?`<span class="badge badge-m">${escapeHtml(r.하원방법)}</span>`:'-'}</td>`
        +`<td class="memo">${escapeHtml(r.메모)||'-'}</td>`
        +`<td><button class="btn btn-red btn-sm" onclick="adminDel(${r.id},'${(r.이름||'').replace(/'/g,"\\'")}','${r.요일}')">삭제</button></td>`;
      if(j===0){
        html+=`<tr class="grp-start"><td class="num" rowspan="${n}">${i+1}</td><td class="nm" rowspan="${n}">${escapeHtml(g.이름)}</td>${rest}</tr>`;
      }else{
        html+=`<tr>${rest}</tr>`;
      }
    });
  });
  tb.innerHTML=html;
}
async function adminDel(id,name,day){
  if(!await uiConfirm(`<strong>${escapeHtml(name)}</strong> / ${day}<br>삭제할까요?`,'삭제하기'))return;
  try{await api('/api/delete',{method:'POST',auth:true,body:{mode:'one',id}});await loadRecords();toast('삭제되었습니다');}
  catch(e){if(e.status===401){adminLogout();}else toast('⚠️ '+e.message);}
}

/* ── DELETE (개별/전체) ── */
function openDelModal(){document.getElementById('modal-del').classList.add('open');}
function closeDelModal(){document.getElementById('modal-del').classList.remove('open');}
async function clearAll(){
  closeDelModal();
  try{await api('/api/delete',{method:'POST',auth:true,body:{mode:'all'}});await loadRecords();toast('전체 삭제 완료');}
  catch(e){if(e.status===401){adminLogout();}else toast('⚠️ '+e.message);}
}

/* ── EXCEL ── */
function exportExcel(){
  if(!records.length)return toast('신청 내역이 없습니다');
  const sorted=[...records].sort((a,b)=>a.이름!==b.이름?a.이름.localeCompare(b.이름,'ko'):DAYS.indexOf(a.요일)-DAYS.indexOf(b.요일));
  const data=sorted.map((r,i)=>({번호:i+1,이름:r.이름,요일:r.요일,희망수업시간:r.희망수업시간,등원장소:r.등원장소||'',학교하교시간:r.학교하교시간||'',등원방법:r.등원방법||'',하원장소:r.하원장소||'',하원방법:r.하원방법||'',메모:r.메모||''}));
  const wb=XLSX.utils.book_new(),ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[{wch:5},{wch:10},{wch:8},{wch:12},{wch:18},{wch:14},{wch:8},{wch:18},{wch:8},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'차량신청');
  const t=new Date(),fn=`차량신청_${t.getFullYear()}${String(t.getMonth()+1).padStart(2,'0')}${String(t.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb,fn);toast('📊 엑셀 다운로드 완료','ok');
}

/* ── 범용 확인 팝업 ── */
function uiConfirm(msg,okLabel='확인',title='확인'){
  return new Promise(resolve=>{
    const bg=document.getElementById('modal-confirm');
    const okBtn=document.getElementById('confirm-ok');
    const cancelBtn=document.getElementById('confirm-cancel');
    document.getElementById('confirm-title').textContent=title;
    document.getElementById('confirm-msg').innerHTML=msg;
    okBtn.textContent=okLabel;
    const close=v=>{bg.classList.remove('open');okBtn.onclick=null;cancelBtn.onclick=null;bg.onclick=null;resolve(v);};
    okBtn.onclick=()=>close(true);
    cancelBtn.onclick=()=>close(false);
    bg.onclick=e=>{if(e.target===bg)close(false);};
    bg.classList.add('open');
  });
}

/* ── UTILS ── */
function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showE(el,msg){el.textContent=msg;el.classList.add('show');}
let _tt;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>el.className='toast',2800);}

/* ── INIT: 저장된 키가 있으면 바로 로그인 시도 ── */
(async()=>{
  if(adminKey){
    try{await api('/api/login',{method:'POST',body:{password:adminKey}});showPage('admin');await loadRecords();}
    catch{adminLogout();}
  }
})();
</script>
</body>
</html>
